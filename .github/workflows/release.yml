name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin-target: x86_64
            name: linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            maturin-target: x86_64
            name: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            maturin-target: aarch64
            name: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.12
            3.13
            3.14

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.maturin-target }}
          args: --release --out dist --find-interpreter
          manylinux: auto

      - name: Package standalone CLI binary
        run: |
          BIN="target/${{ matrix.target }}/release/barca"
          [ -f "$BIN" ] || BIN="target/release/barca"
          cp "$BIN" barca-${{ matrix.name }}
          chmod +x barca-${{ matrix.name }}
          tar czf barca-${{ matrix.name }}.tar.gz barca-${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.name }}
          path: barca-${{ matrix.name }}.tar.gz

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  release:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Install git-cliff
        run: pip install git-cliff

      - name: Generate release notes
        run: |
          git cliff --config cliff.toml --latest --strip header > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Install" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo '```bash' >> RELEASE_NOTES.md
          echo "uv add barca" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md

      - name: Collect release assets
        run: |
          mkdir -p release/
          cp artifacts/wheels-*/*.whl release/
          cp artifacts/cli-*/*.tar.gz release/
          cp artifacts/sdist/*.tar.gz release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'dev') }}
          body_path: RELEASE_NOTES.md

  publish-pypi:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect wheels and sdist
        run: |
          mkdir -p dist/
          cp artifacts/wheels-*/*.whl dist/
          cp artifacts/sdist/*.tar.gz dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
