name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build wheels (Python package + bundled CLI binary) ──────────────
  #
  # Each wheel contains:
  #   - The `barca` Python package (@asset decorator, inspect, worker)
  #   - The `barca` CLI binary (installed to bin/ on `uv pip install`)
  #
  build-wheels:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin-target: x86_64
            name: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            maturin-target: aarch64
            name: linux-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            maturin-target: x86_64
            name: macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            maturin-target: aarch64
            name: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.11
            3.12
            3.13

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # Build the CLI binary first, then stage it for wheel inclusion
      - name: Build CLI binary
        run: cargo build -p barca-cli --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Stage CLI binary for wheel
        run: |
          mkdir -p crates/barca-py/data/scripts
          cp target/${{ matrix.target }}/release/barca crates/barca-py/data/scripts/barca
          chmod +x crates/barca-py/data/scripts/barca

      # Build wheels — includes both the Python extension and the CLI binary
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.maturin-target }}
          args: --release --out dist --find-interpreter
          manylinux: auto
          manifest-path: crates/barca-py/Cargo.toml

      - name: Clean staged data
        run: rm -rf crates/barca-py/data/scripts

      # Also upload the standalone CLI binary
      - name: Package standalone CLI binary
        run: |
          cp target/${{ matrix.target }}/release/barca barca-${{ matrix.name }}
          chmod +x barca-${{ matrix.name }}
          tar czf barca-${{ matrix.name }}.tar.gz barca-${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.name }}
          path: barca-${{ matrix.name }}.tar.gz

  # ── Build source distribution ───────────────────────────────────────
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          manifest-path: crates/barca-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release/
          cp artifacts/wheels-*/*.whl release/
          cp artifacts/cli-*/*.tar.gz release/
          cp artifacts/sdist/*.tar.gz release/
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'rc') }}
          body: |
            ## Install

            ```bash
            uv pip install barca --find-links 'https://github.com/${{ github.repository }}/releases/expanded_assets/${{ github.ref_name }}'
            ```

            This installs both the `barca` CLI and the Python `@asset()` decorator.

            See the [README](https://github.com/${{ github.repository }}#readme) for usage.
