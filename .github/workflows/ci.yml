name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python (free-threaded 3.14t)
        run: uv python install 3.14t

      - name: Sync workspace
        run: uv sync

      - name: Tests
        env:
          NO_COLOR: "1"
          TERM: dumb
          COLUMNS: "200"
        run: uv run pytest tests/ -v
