name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: cargo test

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install maturin and build
        run: |
          pip install maturin
          rm -rf target/wheels
          maturin build --release
          pip install target/wheels/*.whl

      - name: Run integration tests
        run: |
          bash tests/integration/test_cli.sh
          bash tests/integration/test_cache.sh
          bash tests/integration/test_cache_gaps.sh
