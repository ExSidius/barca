[project]
name = "barca-workspace"
version = "0.1.0"
description = "Barca — minimal asset orchestrator"
requires-python = ">=3.13"

[tool.uv]
dev-dependencies = [
    "barca[server]",
    "pytest>=8.0",
    "scikit-learn>=1.0",
    "niquests>=3.0",
    "mkdocs-material>=9.0",
    "mkdocstrings[python]>=0.24",
]

[tool.uv.workspace]
members = ["packages/barca"]

[tool.uv.sources]
barca = { workspace = true }

[tool.ruff]
line-length = 200
