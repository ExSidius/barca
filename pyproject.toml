[project]
name = "barca-workspace"
version = "0.1.0"
description = "Barca — minimal asset orchestrator"
requires-python = ">=3.13"

[tool.uv]
dev-dependencies = [
    "barca",
    "barca-cli",
    "pytest>=8.0",
    "scikit-learn>=1.0",
]

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
barca = { workspace = true }
barca-cli = { workspace = true }

[tool.ruff]
line-length = 200
