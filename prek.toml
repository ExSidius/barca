# Configuration for prek (pre-commit in Rust)

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-merge-conflict" },
    { id = "mixed-line-ending", args = ["--fix=lf"] },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.11.13"
hooks = [
    { id = "ruff", args = ["--fix"] },
    { id = "ruff-format" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "cargo-fmt", name = "cargo fmt", language = "system", entry = "cargo fmt --all --check", pass_filenames = false, types = ["rust"] },
    { id = "ty", name = "ty", language = "system", entry = "ty check python/barca/", pass_filenames = false, types = ["python"] },
    { id = "perf-check", name = "perf check", language = "system", entry = "python benchmarks/perf/profile.py", pass_filenames = false, stages = ["pre-push"] },
]
