[project]
name = "barca"
version = "0.1.0"
description = "Minimal asset orchestrator — core library."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "libsql-experimental>=0.0.50",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/barca"]
