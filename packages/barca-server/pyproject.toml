[project]
name = "barca-server"
version = "0.1.0"
description = "Minimal asset orchestrator — HTTP server + scheduler."
requires-python = ">=3.13"
dependencies = [
    "barca",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
]

[tool.uv.sources]
barca = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/barca_server"]
