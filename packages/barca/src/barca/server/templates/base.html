<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Barca{% endblock %}</title>

  <!-- Geist font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', 'system-ui', 'sans-serif'],
            mono: ['Geist Mono', 'monospace'],
          },
          colors: {
            page:  '#0a0a0a',
            card:  '#111111',
            hover: '#1a1a1a',
            border: '#262626',
          }
        }
      }
    }
  </script>

  <!-- App CSS (design tokens + components) -->
  <link rel="stylesheet" href="/static/app.css" />

  {% block head %}{% endblock %}
</head>
<body class="bg-page text-[var(--text-1)] font-sans antialiased">
  {% block body %}{% endblock %}

  <!-- Datastar CDN (v1.0.0-RC.8) -->
  <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.8/bundles/datastar.js"></script>
</body>
</html>
