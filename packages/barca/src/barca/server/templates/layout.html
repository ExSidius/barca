{% extends "base.html" %}

{% block body %}
<div class="app-shell" data-signals="{sidebarOpen: true}">

  <!-- Sidebar -->
  <aside class="sidebar" data-class:collapsed="!$sidebarOpen">
    <div class="flex items-center gap-2 px-4 py-5 border-b border-[var(--border)]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-[var(--text-1)] shrink-0">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="nav-label text-sm font-semibold text-[var(--text-1)]">Barca</span>
    </div>

    <nav class="flex flex-col gap-0.5 p-2 flex-1">
      <a href="/ui/" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="shrink-0">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="/ui/assets" class="nav-item {% if active_page == 'assets' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="shrink-0">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        <span class="nav-label">Assets</span>
      </a>
      <a href="/ui/jobs" class="nav-item {% if active_page == 'jobs' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="shrink-0">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="nav-label">Jobs</span>
      </a>
      <a href="/ui/sensors" class="nav-item {% if active_page == 'sensors' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="shrink-0">
          <path d="M2 12h4M18 12h4M12 2v4M12 18v4"/><circle cx="12" cy="12" r="4"/>
        </svg>
        <span class="nav-label">Sensors</span>
      </a>
    </nav>

    <div class="px-2 pb-3 border-t border-[var(--border)] pt-2">
      <a href="/docs" class="nav-item text-[var(--text-3)]">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="shrink-0">
          <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/>
        </svg>
        <span class="nav-label">API Docs</span>
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex flex-col flex-1 min-w-0">

    <!-- Topbar -->
    <header class="topbar">
      <button
        class="p-1.5 rounded-md text-[var(--text-3)] hover:text-[var(--text-1)] hover:bg-[var(--bg-hover)] transition-colors"
        data-on:click="$sidebarOpen = !$sidebarOpen"
        aria-label="Toggle sidebar"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="flex items-center gap-2 text-sm text-[var(--text-3)]">
        {% block breadcrumb %}{% endblock %}
      </div>

      <div class="ml-auto flex items-center gap-2">
        {% block topbar_actions %}{% endblock %}
        <!-- Reconcile button always visible -->
        <div data-signals="{reconciling: false, reconcileOpen: false, reconcileError: ''}">
          <button
            class="btn btn-ghost text-xs gap-1.5"
            data-on:click="@post('/ui/reconcile')"
            data-attr:aria-busy="$reconciling"
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" data-show="!$reconciling">
              <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spinner" data-show="$reconciling">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
            <span data-text="$reconciling ? 'Reconciling…' : 'Reconcile'">Reconcile</span>
          </button>

          <!-- Reconcile result slide-over -->
          <div class="slide-over" data-class:open="$reconcileOpen">
            <div class="slide-over-header">
              <span class="text-sm font-medium">Reconcile Result</span>
              <button class="p-1 rounded hover:bg-[var(--bg-hover)]" data-on:click="$reconcileOpen = false">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
            <div id="reconcile-result" class="p-4 text-sm text-[var(--text-2)]">
              <span data-show="$reconcileError" class="text-red-400" data-text="$reconcileError"></span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page body -->
    <main class="page-body page-enter">
      {% block content %}{% endblock %}
    </main>

  </div>
</div>
{% endblock %}
