{% from "components/macros.html" import status_badge %}
<table class="data-table w-full">
  <thead>
    <tr>
      <th>Update Detected</th>
      <th>Output</th>
      <th>Observed At</th>
    </tr>
  </thead>
  <tbody>
    {% for o in observations %}
    <tr>
      <td>
        {% if o.update_detected %}
          <span class="text-green-400 text-xs font-mono">yes</span>
        {% else %}
          <span class="text-[var(--text-3)] text-xs font-mono">no</span>
        {% endif %}
      </td>
      <td class="font-mono text-xs text-[var(--text-3)] max-w-[320px] truncate">
        {{ o.output_json or '—' }}
      </td>
      <td class="text-xs text-[var(--text-3)]">{{ o.created_at or '—' }}</td>
    </tr>
    {% else %}
    <tr>
      <td colspan="3" class="py-8 text-center text-sm text-[var(--text-3)]">No observations yet</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
