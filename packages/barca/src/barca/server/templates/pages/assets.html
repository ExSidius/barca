{% extends "layout.html" %}

{% block title %}Assets — Barca{% endblock %}

{% set active_page = 'assets' %}

{% block breadcrumb %}
<span class="text-[var(--text-3)]">Assets</span>
{% endblock %}

{% block content %}
<div
  class="flex flex-col gap-4"
  data-signals="{kindFilter: 'all', search: ''}"
  data-on:load="@get('/ui/assets/watch-all')"
>

  <!-- Filters -->
  <div class="flex flex-col sm:flex-row sm:items-center gap-3">
    <div class="tab-group">
      <button class="tab-btn" data-class:active="$kindFilter === 'all'"
        data-on:click="$kindFilter='all'; @get('/ui/fragments/assets')">All</button>
      <button class="tab-btn" data-class:active="$kindFilter === 'asset'"
        data-on:click="$kindFilter='asset'; @get('/ui/fragments/assets?kind=asset')">Assets</button>
      <button class="tab-btn" data-class:active="$kindFilter === 'sensor'"
        data-on:click="$kindFilter='sensor'; @get('/ui/fragments/assets?kind=sensor')">Sensors</button>
      <button class="tab-btn" data-class:active="$kindFilter === 'effect'"
        data-on:click="$kindFilter='effect'; @get('/ui/fragments/assets?kind=effect')">Effects</button>
    </div>

    <div class="relative sm:ml-auto">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        class="absolute left-2.5 top-1/2 -translate-y-1/2 text-[var(--text-3)]">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        placeholder="Search assets…"
        class="input pl-8 w-full sm:w-64"
        data-bind:search
        data-on:input__debounce.300ms="@get('/ui/fragments/assets?kind=' + $kindFilter + '&q=' + $search)"
      />
    </div>
  </div>

  <!-- Asset table (updated by fragment + watch-all stream) -->
  <div class="card overflow-hidden">
    {% include "components/asset_table_body.html" %}
  </div>

</div>
{% endblock %}
