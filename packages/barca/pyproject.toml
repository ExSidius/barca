[project]
name = "barca"
version = "0.1.0"
description = "Minimal asset orchestrator."
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.0",
    "croniter>=2.0",
    "pyturso>=0.5.0",
    "typer[all]>=0.9",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "watchfiles>=0.21",
]

[project.optional-dependencies]
# Datadog APM. Enable with `uv sync --extra datadog` and set DD_SERVICE,
# DD_ENV, DD_AGENT_HOST per the standard ddtrace env contract. With the
# extra absent, `barca._telemetry` falls back to no-op stubs so the rest
# of the codebase can call into it unconditionally.
datadog = ["ddtrace>=2.0"]

[project.scripts]
barca = "barca.cli.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/barca"]
