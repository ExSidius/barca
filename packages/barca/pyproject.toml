[project]
name = "barca"
version = "0.1.0"
description = "Minimal asset orchestrator."
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.0",
    "croniter>=2.0",
    "pyturso>=0.5.0",
    "typer[all]>=0.9",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "datastar-py>=0.8.0",
    "watchfiles>=0.21",
    "jinja2>=3.1",
]

[project.scripts]
barca = "barca.cli.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/barca"]
