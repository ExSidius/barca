[project]
name = "barca-cli"
version = "0.1.0"
description = "Minimal asset orchestrator — CLI."
requires-python = ">=3.13"
dependencies = [
    "barca",
    "typer>=0.9",
]

[project.scripts]
barca = "barca_cli.cli:app"

[tool.uv.sources]
barca = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/barca_cli"]
