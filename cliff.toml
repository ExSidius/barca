# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n"
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
render_always = false

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
commit_preprocessors = [
    # Strip Co-Authored-By trailers
    { pattern = '\n\nCo-Authored-By:.*', replace = "" },
]
commit_parsers = [
    { message = "^[Mm]erge", skip = true },
    { message = "^[Ff]eat", group = "Features" },
    { message = "^[Ff]ix", group = "Bug Fixes" },
    { message = "^[Rr]efactor", group = "Refactor" },
    { message = "^[Pp]olish", group = "Polish" },
    { message = "^[Dd]oc", group = "Documentation" },
    { message = "^[Tt]est", group = "Testing" },
    { message = "^[Pp]erf", group = "Performance" },
    { message = "^[Dd]rop|^[Rr]emove", group = "Removed" },
    { message = "^[Bb]ump|^[Rr]elease|^[Vv]0\\.", group = "Release" },
    { message = ".*", group = "Changes" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
topo_order_commits = true
